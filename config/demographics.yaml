# Demographic variant groups for GovBench (v1).
#
# DESIGN PRINCIPLE — matched variation:
#   *_core groups hold age and socioeconomic status CONSTANT and vary only
#   identity (race/ethnicity, religion, gender, national origin), so any P1
#   parity gap is attributable to identity bias.
#   *_socioeconomic groups hold ethnicity and gender constant and vary only
#   class signals, isolating socioeconomic bias.
#   *_intersectional groups deliberately vary multiple axes to model
#   real-world compound (dis)advantage and measure disparate impact.

